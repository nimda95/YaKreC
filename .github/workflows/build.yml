name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, linux, x64]
    strategy:
      fail-fast: false
      matrix:
        target: [apk, appimage]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.target }}
        run: ./scripts/build.sh --target=${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kvm-${{ matrix.target }}
          path: |
            build/dist/kvm.apk
            build/dist/kvm-x86_64.AppImage
          if-no-files-found: ignore
          retention-days: 14
